name: Conformance K8s 1.34

# Top of the per-K8s-version chain. Runs on every push/PR. When this
# workflow succeeds on `main`, conformance-v1-33.yml fires next via
# workflow_run, and so on down the chain.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  conformance:
    uses: ./.github/workflows/conformance-version.yml
    with:
      k8s_version: "1.34"
      kind_version: "v0.31.0"
      kind_image: "kindest/node:v1.34.3@sha256:08497ee19eace7b4b5348db5c6a1591d7752b164530a36f855cb0f2bdcbadd48"
