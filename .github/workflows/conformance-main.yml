name: Conformance (main)

# Fires on every push to main and runs every supported K8s minor (1.36 → 1.21)
# in a `needs:` chain — older versions only run after the next-newer version
# passed. Each job dispatches the matching `conformance-v1-XX.yml` via
# workflow_dispatch and waits for it to finish; that way the per-version
# workflow files keep producing their own runs (and their badge URLs in
# README.md stay accurate).
#
# This pattern replaces the previous `workflow_run`-chained approach. GitHub
# silently caps chained `workflow_run` events past ~4 hops, which left
# v1.30 → v1.21 with zero runs on main. `needs:` is intra-workflow ordering
# and has no such cap; `workflow_dispatch` likewise has no chaining cap.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: write    # required for `gh workflow run`
  contents: read

jobs:
  v1_36:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/dispatch-conformance
        with:
          workflow: conformance-v1-36.yml
          github-token: ${{ github.token }}

  v1_35:
    needs: [v1_36]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/dispatch-conformance
        with:
          workflow: conformance-v1-35.yml
          github-token: ${{ github.token }}

