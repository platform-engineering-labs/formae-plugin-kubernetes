name: Conformance (PR)

# PR feedback runs the conformance suite against the most recently
# supported K8s minor that has a kind image (currently v1.36). The
# full per-minor chain (1.36 → 1.21) runs on `main` via the
# conformance-v1-XX.yml workflows triggered by workflow_run after each
# merge — older versions only run once newer ones have stayed green on
# main, so PR latency stays low without sacrificing coverage of the
# support window.

on:
  pull_request:
    branches: [main]

jobs:
  v1_36:
    uses: ./.github/workflows/conformance-version.yml
    with:
      k8s_version: "1.36"
      kind_version: "v0.32.0"
      kind_image: "kindest/node:v1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5"
