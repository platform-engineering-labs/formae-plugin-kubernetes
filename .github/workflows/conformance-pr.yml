name: Conformance (PR)

# PR feedback runs the conformance suite against the most recently
# supported K8s minor only (currently v1.34). The full per-minor chain
# (1.34 → 1.21) runs on `main` via the conformance-v1-XX.yml workflows
# triggered by workflow_run after each merge — older versions only run
# once newer ones have stayed green on main, so PR latency stays low
# without sacrificing coverage of the support window.

on:
  pull_request:
    branches: [main]

jobs:
  v1_34:
    uses: ./.github/workflows/conformance-version.yml
    with:
      k8s_version: "1.34"
      kind_version: "v0.31.0"
      kind_image: "kindest/node:v1.34.3@sha256:08497ee19eace7b4b5348db5c6a1591d7752b164530a36f855cb0f2bdcbadd48"
