name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_conformance:
        description: 'Run conformance tests'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Build
        run: make build

  test-unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run unit tests
        run: make test-unit

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: latest

  pkl-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Validate Pkl manifest
        run: |
          pkl eval formae-plugin.pkl --format json > /dev/null
          echo "Manifest validated successfully"

  verify-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Verify schema
        run: make verify-schema

  # Discover test cases dynamically from testdata/
  # Splits into resource tests and chart tests for different timeout configs.
  discover-tests:
    needs: [build, lint, pkl-validate, verify-schema, test-unit]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      resource-tests: ${{ steps.discover.outputs.resource-tests }}
      chart-tests: ${{ steps.discover.outputs.chart-tests }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover test cases
        id: discover
        run: |
          ALL_CASES=$(ls testdata/*.pkl 2>/dev/null \
            | xargs -n1 basename \
            | grep -v '\-update\.pkl$' \
            | grep -v '\-replace\.pkl$' \
            | sed 's/\.pkl$//')

          RESOURCE_TESTS=$(echo "$ALL_CASES" | grep -v '\-chart$' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          CHART_TESTS=$(echo "$ALL_CASES" | grep '\-chart$' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "Resource tests: ${RESOURCE_TESTS}"
          echo "Chart tests: ${CHART_TESTS}"
          echo "resource-tests=${RESOURCE_TESTS}" >> "$GITHUB_OUTPUT"
          echo "chart-tests=${CHART_TESTS}" >> "$GITHUB_OUTPUT"

  # Conformance tests for individual K8S resource types.
  conformance-tests:
    needs: [discover-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15
    strategy:
      matrix:
        test-case: ${{ fromJson(needs.discover-tests.outputs.resource-tests) }}
      max-parallel: 10
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: formae-test

      - name: Install plugin
        run: make install

      - name: Run conformance tests (${{ matrix.test-case }})
        env:
          FORMAE_TEST_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: make conformance-test-crud-run conformance-test-discovery-run TEST=${{ matrix.test-case }} PARALLEL=1

  # Chart conformance tests deploy full Helm charts (many resources).
  # Discovery needs a longer timeout since charts create numerous resources.
  chart-conformance-tests:
    needs: [discover-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    strategy:
      matrix:
        test-case: ${{ fromJson(needs.discover-tests.outputs.chart-tests) }}
      max-parallel: 10
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: formae-test

      - name: Install plugin
        run: make install

      - name: Run chart conformance tests (${{ matrix.test-case }})
        env:
          FORMAE_TEST_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
          FORMAE_TEST_DISCOVERY_TIMEOUT: "5"
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          command: make conformance-test-crud-run conformance-test-discovery-run TEST=${{ matrix.test-case }} PARALLEL=1

  # Drift detection test verifies that formae detects and reconciles
  # external changes introduced via kubectl.
  drift-test:
    needs: [build, lint, pkl-validate, verify-schema, test-unit]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: formae-drift-test

      - name: Download formae
        run: |
          OS=$(uname | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m | tr -d '_' | sed s/aarch64/arm64/)
          INSTALL_DIR=$(mktemp -d)
          curl -fsSL "https://hub.platform.engineering/get/binaries/${OS}-${ARCH}/pelmgr" -o "${INSTALL_DIR}/pelmgr"
          chmod +x "${INSTALL_DIR}/pelmgr"
          "${INSTALL_DIR}/pelmgr" --install-path "${INSTALL_DIR}" --yes install formae
          echo "FORMAE_BINARY=${INSTALL_DIR}/bin/formae" >> "$GITHUB_ENV"

      - name: Run drift test
        run: make drift-test

  # Notify when build is fixed (was red, now green)
  notify-fixed:
    needs: [build, test-unit, lint, pkl-validate, verify-schema, conformance-tests, chart-conformance-tests, drift-test]
    runs-on: ubuntu-latest
    if: success() && github.event_name == 'push'
    steps:
      - name: Check if previous run failed
        id: check_previous
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch: context.ref.replace('refs/heads/', ''),
              per_page: 2,
              status: 'completed'
            });

            // Get previous run (skip current which isn't completed yet)
            const previousRun = runs.data.workflow_runs.find(run => run.id !== context.runId);

            if (previousRun && previousRun.conclusion === 'failure') {
              return 'true';
            }
            return 'false';
          result-encoding: string

      - name: Notify Slack (Fixed)
        if: steps.check_previous.outputs.result == 'true'
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":white_check_mark: CI fixed on ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":white_check_mark: *CI fixed* on `${{ github.repository }}`\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Run"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }

  # Notify on failure
  notify-failure:
    needs: [build, test-unit, lint, pkl-validate, verify-schema, conformance-tests, chart-conformance-tests, drift-test]
    runs-on: ubuntu-latest
    if: failure() && github.event_name == 'push'
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v2.1.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: CI failed on ${{ github.repository }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: *CI failed* on `${{ github.repository }}`\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Run"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }
