name: Conformance (per K8s version)

# Reusable workflow: runs the per-fixture parallel conformance matrix
# (shared resources + features) against a single K8s minor. Called from
# ci.yml in a chained sequence so older versions only run once newer
# versions pass.

on:
  workflow_call:
    inputs:
      k8s_version:
        description: "K8s minor version (e.g. 1.34)"
        type: string
        required: true
      kind_version:
        description: "KinD release tag for the matrix entry (e.g. v0.31.0)"
        type: string
        required: true
      kind_image:
        description: "kindest/node image (with sha256 digest) matching k8s_version"
        type: string
        required: true

jobs:
  # Prepare job: install formae binary via the official setup script,
  # build the plugin once, populate caches, ship everything matrix
  # entries need as a single `test-runtime` artifact.
  #
  # Replaces the previous build-formae+source-clone+replace-directive
  # pattern. The setup/formae.sh installer pulls the latest published
  # binary from hub.platform.engineering; PklProjects resolve against
  # hub-hosted Pkl packages (no source-mount needed). To pin a specific
  # formae version locally, pass `-v <X.Y.Z>` to bash in the install
  # step below.
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false

      - name: Restore + save Go module cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: gomod-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            gomod-${{ runner.os }}-

      - uses: ./.github/actions/setup-pkl-cached
        with:
          save: 'true'  # prepare is allowed to save (single writer per run)

      - name: Install formae
        # Use the pelmgr-based installer (get/formae.sh) — it pulls
        # from repos/platform.engineering/pel, which tracks current
        # releases. The alternate setup/formae.sh reads
        # binaries/repo.json and lags behind. Discover install path
        # and export FORMAE_BIN for downstream steps + matrix entries.
        run: |
          set -euo pipefail
          /bin/bash -c "$(curl -fsSL https://hub.platform.engineering/get/formae.sh)"
          # Locate the binary pelmgr just installed
          FORMAE_BIN=$(command -v formae || find "$HOME/.pel" /opt/pel -type f -name formae 2>/dev/null | head -1)
          if [ -z "$FORMAE_BIN" ]; then
            echo "formae binary not found after install"; exit 1
          fi
          echo "FORMAE_BIN=$FORMAE_BIN"
          echo "FORMAE_BIN=$FORMAE_BIN" >> "$GITHUB_ENV"
          echo "$(dirname "$FORMAE_BIN")" >> "$GITHUB_PATH"
          "$FORMAE_BIN" --version

      - name: Download Go modules
        run: go mod download

      - name: Install plugin
        # `make install` builds the plugin binary, copies the generated
        # multi-version schema tree, copies the manifest, and runs
        # `pkl project resolve` on the install dir to lock deps.
        run: make install

      - name: Bundle test-runtime
        # Tarball everything under ~/.pel — formae binary tree
        # (installed by pelmgr) + plugin install tree (installed by
        # `make install`). Also record the absolute path of the formae
        # binary so the matrix can export FORMAE_BINARY without
        # re-discovering it.
        run: |
          set -euo pipefail
          tar -C "$HOME" -czf install-bundle.tgz .pel
          echo "$FORMAE_BIN" > formae-binary-path.txt
          ls -la install-bundle.tgz formae-binary-path.txt
          cat formae-binary-path.txt

      - uses: actions/upload-artifact@v7
        with:
          name: test-runtime
          path: |
            install-bundle.tgz
            formae-binary-path.txt
          retention-days: 1

  discover:
    runs-on: ubuntu-latest
    outputs:
      resource-tests: ${{ steps.discover.outputs.resource-tests }}
      feature-tests: ${{ steps.discover.outputs.feature-tests }}
    steps:
      - uses: actions/checkout@v4
      - id: discover
        run: |
          # Shared resource fixtures (testdata/generated/v*/shared) run in
          # the conformance matrix; formation fixtures
          # (testdata/main/formations/) are intentionally excluded.
          RESOURCE_TESTS=$(ls testdata/generated/v${{ inputs.k8s_version }}/shared/*.pkl 2>/dev/null \
            | xargs -n1 basename \
            | grep -v '\-update\.pkl$' \
            | grep -v '\-replace\.pkl$' \
            | sed 's/\.pkl$//' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "Resource tests: ${RESOURCE_TESTS}"
          echo "resource-tests=${RESOURCE_TESTS}" >> "$GITHUB_OUTPUT"

          # Per-version feature fixtures run in a parallel features-matrix.
          # Each feature directory under testdata/generated/v<ver>/features/
          # exists only when the version's K8s minor is at-or-after the
          # feature's minK8sVersion (generated by tools/gen-versioned-testdata
          # from each feature's meta.pkl). Empty array on older K8s minors
          # is handled by the features job's if: clause.
          FEATURE_TESTS=$(ls -d testdata/generated/v${{ inputs.k8s_version }}/features/*/ 2>/dev/null \
            | xargs -n1 basename \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "Feature tests: ${FEATURE_TESTS}"
          echo "feature-tests=${FEATURE_TESTS}" >> "$GITHUB_OUTPUT"

  conformance:
    needs: [prepare, discover]
    runs-on: ubuntu-latest
    # 20min budget = 2 retries × 7min + ~4min for setup (checkout,
    # toolchains, cache restore, artifact extract, KinD spin) + cushion.
    timeout-minutes: 20
    strategy:
      matrix:
        test-case: ${{ fromJson(needs.discover.outputs.resource-tests) }}
      max-parallel: 10
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false

      - name: Restore Go module cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: gomod-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            gomod-${{ runner.os }}-

      - uses: ./.github/actions/setup-pkl-cached

      - uses: ./.github/actions/restore-test-runtime

      - name: Create kind cluster (K8s ${{ inputs.k8s_version }})
        uses: helm/kind-action@v1
        with:
          version: ${{ inputs.kind_version }}
          cluster_name: formae-test
          node_image: ${{ inputs.kind_image }}

      - name: Run conformance tests (${{ matrix.test-case }})
        # FORMAE_BINARY is exported by the restore-test-runtime composite
        # via $GITHUB_ENV and inherits into this step automatically.
        env:
          FORMAE_TEST_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}-v${{ inputs.k8s_version }}
          FORMAE_TEST_TESTDATA_DIR: testdata/generated/v${{ inputs.k8s_version }}/shared
          FORMAE_K8S_VERSION: ${{ inputs.k8s_version }}
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 7
          max_attempts: 2
          command: make conformance-test-crud-run conformance-test-discovery-run TEST=${{ matrix.test-case }} PARALLEL=1 TIMEOUT=6

  # Per-version feature fixtures (testdata/generated/v<ver>/features/*) run
  # against a live cluster the same way as shared resources. The fixtures
  # only exist on K8s minors at-or-after each feature's minK8sVersion, so
  # this job is gated on the discover step producing a non-empty matrix.
  # Older K8s minors with no GA-yet features simply skip the whole job.
  conformance-features:
    needs: [prepare, discover]
    if: needs.discover.outputs.feature-tests != '' && needs.discover.outputs.feature-tests != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        feature: ${{ fromJson(needs.discover.outputs.feature-tests) }}
      max-parallel: 10
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false

      - name: Restore Go module cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: gomod-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            gomod-${{ runner.os }}-

      - uses: ./.github/actions/setup-pkl-cached

      - uses: ./.github/actions/restore-test-runtime

      - name: Create kind cluster (K8s ${{ inputs.k8s_version }})
        uses: helm/kind-action@v1
        with:
          version: ${{ inputs.kind_version }}
          cluster_name: formae-test
          node_image: ${{ inputs.kind_image }}

      - name: Run feature conformance (${{ matrix.feature }})
        # FORMAE_BINARY exported by restore-test-runtime composite.
        env:
          FORMAE_TEST_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}-v${{ inputs.k8s_version }}-${{ matrix.feature }}
          FORMAE_TEST_TESTDATA_DIR: testdata/generated/v${{ inputs.k8s_version }}/features/${{ matrix.feature }}
          FORMAE_K8S_VERSION: ${{ inputs.k8s_version }}
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 7
          max_attempts: 2
          # No TEST filter — each feature dir holds one primary fixture.
          command: make conformance-test-crud-run PARALLEL=1 TIMEOUT=6
