name: Conformance (per K8s version)

# Reusable workflow: runs the per-fixture parallel conformance matrix
# (shared resources + features) against a single K8s minor. Called from
# ci.yml in a chained sequence so older versions only run once newer
# versions pass.

on:
  workflow_call:
    inputs:
      k8s_version:
        description: "K8s minor version (e.g. 1.34)"
        type: string
        required: true
      kind_version:
        description: "KinD release tag for the matrix entry (e.g. v0.31.0)"
        type: string
        required: true
      kind_image:
        description: "kindest/node image (with sha256 digest) matching k8s_version"
        type: string
        required: true
      formae_ref:
        description: "formae version installed via setup/formae.sh. Must match the PklProject dependency pin (currently 0.84.0)."
        type: string
        required: false
        default: "0.84.0"

jobs:
  # Prepare job: install formae binary via the official setup script,
  # build the plugin once, populate caches, ship everything matrix
  # entries need as a single `test-runtime` artifact.
  #
  # Replaces the previous build-formae+source-clone+replace-directive
  # pattern. The setup/formae.sh installer pulls a published binary
  # from hub.platform.engineering; PklProjects resolve against
  # hub-hosted stable Pkl packages (no source-mount needed).
  #
  # To pin a specific formae version, set inputs.formae_ref to the
  # version string (e.g. "0.84.0"). Default tracks the PklProject pin.
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false

      - name: Restore + save Go module cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: gomod-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            gomod-${{ runner.os }}-

      - uses: ./.github/actions/setup-pkl-cached
        with:
          save: 'true'  # prepare is allowed to save (single writer per run)

      - name: Install formae
        # Installs the formae binary into /opt/pel/formae/bin/formae.
        # Pin a version with `-v <X.Y.Z>` (e.g. -v 0.84.0). Default
        # (latest stable) tracks the PklProject formae pin in this repo.
        # `-y` skips the interactive prompt (CI has no tty).
        run: |
          set -euo pipefail
          curl -fsSL https://hub.platform.engineering/setup/formae.sh \
            | bash -s -- -v "${{ inputs.formae_ref }}" -y
          echo "/opt/pel/formae/bin" >> "$GITHUB_PATH"
          /opt/pel/formae/bin/formae --version

      - name: Download Go modules
        run: go mod download

      - name: Install plugin
        # `make install` builds the plugin binary, copies the generated
        # multi-version schema tree, copies the manifest, and runs
        # `pkl project resolve` on the install dir to lock deps.
        run: make install

      - name: Bundle test-runtime
        run: |
          set -euo pipefail
          tar -C "$HOME"   -czf install-bundle.tgz .pel/formae
          sudo tar -C /opt/pel -czf formae-binary.tgz formae
          sudo chown "$(id -u):$(id -g)" formae-binary.tgz
          ls -la install-bundle.tgz formae-binary.tgz

      - uses: actions/upload-artifact@v7
        with:
          name: test-runtime
          path: |
            install-bundle.tgz
            formae-binary.tgz
          retention-days: 1

  discover:
    runs-on: ubuntu-latest
    outputs:
      resource-tests: ${{ steps.discover.outputs.resource-tests }}
      feature-tests: ${{ steps.discover.outputs.feature-tests }}
    steps:
      - uses: actions/checkout@v4
      - id: discover
        run: |
          # Shared resource fixtures (testdata/generated/v*/shared) run in
          # the conformance matrix; formation fixtures
          # (testdata/main/formations/) are intentionally excluded.
          RESOURCE_TESTS=$(ls testdata/generated/v${{ inputs.k8s_version }}/shared/*.pkl 2>/dev/null \
            | xargs -n1 basename \
            | grep -v '\-update\.pkl$' \
            | grep -v '\-replace\.pkl$' \
            | sed 's/\.pkl$//' \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "Resource tests: ${RESOURCE_TESTS}"
          echo "resource-tests=${RESOURCE_TESTS}" >> "$GITHUB_OUTPUT"

          # Per-version feature fixtures run in a parallel features-matrix.
          # Each feature directory under testdata/generated/v<ver>/features/
          # exists only when the version's K8s minor is at-or-after the
          # feature's minK8sVersion (generated by tools/gen-versioned-testdata
          # from each feature's meta.pkl). Empty array on older K8s minors
          # is handled by the features job's if: clause.
          FEATURE_TESTS=$(ls -d testdata/generated/v${{ inputs.k8s_version }}/features/*/ 2>/dev/null \
            | xargs -n1 basename \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "Feature tests: ${FEATURE_TESTS}"
          echo "feature-tests=${FEATURE_TESTS}" >> "$GITHUB_OUTPUT"

  conformance:
    needs: [prepare, discover]
    runs-on: ubuntu-latest
    # 20min budget = 2 retries × 7min + ~4min for setup (checkout,
    # toolchains, cache restore, artifact extract, KinD spin) + cushion.
    timeout-minutes: 20
    strategy:
      matrix:
        test-case: ${{ fromJson(needs.discover.outputs.resource-tests) }}
      max-parallel: 10
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false

      - name: Restore Go module cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: gomod-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            gomod-${{ runner.os }}-

      - uses: ./.github/actions/setup-pkl-cached

      - uses: ./.github/actions/restore-test-runtime

      - name: Create kind cluster (K8s ${{ inputs.k8s_version }})
        uses: helm/kind-action@v1
        with:
          version: ${{ inputs.kind_version }}
          cluster_name: formae-test
          node_image: ${{ inputs.kind_image }}

      - name: Run conformance tests (${{ matrix.test-case }})
        env:
          # FORMAE_BINARY pins the plugin-conformance-tests SDK to the
          # binary installed by prepare (matches inputs.formae_ref).
          # Without it, the SDK would auto-download "latest" via orbital
          # and could drift from the PklProject pin → wire protocol
          # mismatch. Keep this in sync with the prepare-job install.
          FORMAE_BINARY: /opt/pel/formae/bin/formae
          FORMAE_TEST_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}-v${{ inputs.k8s_version }}
          FORMAE_TEST_TESTDATA_DIR: testdata/generated/v${{ inputs.k8s_version }}/shared
          FORMAE_K8S_VERSION: ${{ inputs.k8s_version }}
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 7
          max_attempts: 2
          command: make conformance-test-crud-run conformance-test-discovery-run TEST=${{ matrix.test-case }} PARALLEL=1 TIMEOUT=6

  # Per-version feature fixtures (testdata/generated/v<ver>/features/*) run
  # against a live cluster the same way as shared resources. The fixtures
  # only exist on K8s minors at-or-after each feature's minK8sVersion, so
  # this job is gated on the discover step producing a non-empty matrix.
  # Older K8s minors with no GA-yet features simply skip the whole job.
  conformance-features:
    needs: [prepare, discover]
    if: needs.discover.outputs.feature-tests != '' && needs.discover.outputs.feature-tests != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        feature: ${{ fromJson(needs.discover.outputs.feature-tests) }}
      max-parallel: 10
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: 0.30.0

      - name: Download formae binary
        uses: actions/download-artifact@v8
        with:
          name: formae-binary-${{ inputs.k8s_version }}
          path: /tmp/formae-artifact

      - name: Clone formae source for replace directives
        run: |
          set -euo pipefail
          git clone --branch "${{ inputs.formae_ref }}" --depth 1 \
            https://github.com/platform-engineering-labs/formae.git /tmp/formae
          mkdir -p /tmp/formae/bin /tmp/formae/.ops
          cp /tmp/formae-artifact/formae /tmp/formae/bin/formae
          chmod +x /tmp/formae/bin/formae
          /tmp/formae/bin/formae --version

      - name: Inject formae replace directives
        run: |
          set -euo pipefail
          FORMAE_SRC=/tmp/formae
          for pkg in pkg/auth pkg/model pkg/plugin pkg/plugin-conformance-tests pkg/api/model; do
            if grep -q "formae/$pkg" go.mod 2>/dev/null; then
              go mod edit -replace "github.com/platform-engineering-labs/formae/$pkg=$FORMAE_SRC/$pkg"
            fi
          done
          go mod tidy

      - name: Create kind cluster (K8s ${{ inputs.k8s_version }})
        uses: helm/kind-action@v1
        with:
          version: ${{ inputs.kind_version }}
          cluster_name: formae-test
          node_image: ${{ inputs.kind_image }}

      - name: Install plugin (multi-version schema layout)
        run: make install

      - name: Run feature conformance (${{ matrix.feature }})
        env:
          FORMAE_BINARY: /tmp/formae/bin/formae
          FORMAE_TEST_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}-v${{ inputs.k8s_version }}-${{ matrix.feature }}
          # Point the harness at the feature-specific fixture directory.
          # Each feature has one primary fixture (e.g. job.pkl) plus
          # optional -update.pkl / -replace.pkl variants picked up
          # automatically by the harness based on the primary name.
          FORMAE_TEST_TESTDATA_DIR: testdata/generated/v${{ inputs.k8s_version }}/features/${{ matrix.feature }}
          FORMAE_K8S_VERSION: ${{ inputs.k8s_version }}
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 7
          max_attempts: 2
          # No TEST filter — each feature directory holds one resource
          # type, so the harness picks the primary fixture automatically.
          command: make conformance-test-crud-run PARALLEL=1 TIMEOUT=6
