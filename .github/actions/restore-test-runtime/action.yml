# .github/actions/restore-test-runtime/action.yml
name: 'Restore test-runtime artifact'
description: |
  Downloads the `test-runtime` artifact uploaded by the conformance
  prepare job and extracts the bundled $HOME/.pel/ tree (contains both
  the formae binary installed by pelmgr and the plugin install tree
  installed by `make install`).

  Reads formae-binary-path.txt from the artifact and exports
  FORMAE_BINARY + prepends its dirname to PATH so downstream steps can
  invoke `formae` directly.

runs:
  using: composite
  steps:
    - name: Download test-runtime artifact
      uses: actions/download-artifact@v8
      with:
        name: test-runtime
        path: /tmp/test-runtime

    - name: Extract install bundle
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "$HOME/.pel"
        tar -xzf /tmp/test-runtime/install-bundle.tgz -C "$HOME"
        ls -la "$HOME/.pel"

    - name: Resolve formae binary path
      shell: bash
      run: |
        set -euo pipefail
        FORMAE_BIN=$(cat /tmp/test-runtime/formae-binary-path.txt)
        if [ ! -x "$FORMAE_BIN" ]; then
          echo "formae binary not executable at: $FORMAE_BIN"
          echo "Tree under \$HOME/.pel:"
          find "$HOME/.pel" -maxdepth 4 -type f -name formae 2>/dev/null
          exit 1
        fi
        echo "FORMAE_BINARY=$FORMAE_BIN" >> "$GITHUB_ENV"
        echo "$(dirname "$FORMAE_BIN")" >> "$GITHUB_PATH"
        "$FORMAE_BIN" --version
