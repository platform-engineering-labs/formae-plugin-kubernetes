# .github/actions/restore-test-runtime/action.yml
name: 'Restore test-runtime artifact'
description: |
  Downloads the `test-runtime` artifact uploaded by the conformance
  prepare job and extracts:
    - /opt/pel/                (pelmgr install root: formae + pkl + plugins)
    - $HOME/.pel/formae/       (plugin install tree)
  Prepends /opt/pel/bin to GITHUB_PATH so subsequent steps can invoke
  `formae` directly, and exports FORMAE_BINARY for the SDK.

runs:
  using: composite
  steps:
    - name: Download test-runtime artifact
      uses: actions/download-artifact@v8
      with:
        name: test-runtime
        path: /tmp/test-runtime

    - name: Extract /opt/pel tree
      shell: bash
      run: |
        set -euo pipefail
        sudo tar -xzf /tmp/test-runtime/pel-binary.tgz -C /
        sudo chmod -R a+rx /opt/pel
        echo "/opt/pel/bin" >> "$GITHUB_PATH"
        echo "FORMAE_BINARY=/opt/pel/bin/formae" >> "$GITHUB_ENV"
        /opt/pel/bin/formae --version

    - name: Extract plugin install tree
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p "$HOME/.pel"
        tar -xzf /tmp/test-runtime/install-bundle.tgz -C "$HOME"
        ls -la "$HOME/.pel/formae/plugins/"
